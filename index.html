<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lifegate AG Workspace</title>
    
    <!-- Load Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Sora', 'sans-serif'],
              serif: ['Instrument Serif', 'serif'],
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-stone-50 font-sans text-stone-900 selection:bg-teal-200">
    <div id="root">
      <!-- Pre-React loading indicator — React replaces this on mount -->
      <div id="pre-react-indicator" style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;flex-direction:column;gap:12px;background:#fafaf9;">
        <div style="width:32px;height:32px;border:3px solid #d6d3d1;border-top-color:#44403c;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <p id="pre-react-msg" style="font-size:13px;color:#78716c;margin:0;">Loading Lifegate…</p>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <!-- Catch fatal JS errors that happen before React mounts -->
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('pre-react-msg');
        if (el) {
          el.textContent = 'JS Error: ' + (e.message || 'unknown') + ' (' + (e.filename || '') + ':' + e.lineno + ')';
          el.style.color = '#be123c';
          el.style.maxWidth = '600px';
          el.style.textAlign = 'center';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('pre-react-msg');
        if (el && el.style.color !== 'rgb(190, 18, 60)') {
          el.textContent = 'Promise Error: ' + (e.reason || 'unknown');
          el.style.color = '#be123c';
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
